<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>性別平等小學堂 - 管理後台</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            overflow-y: auto;
            padding: 40px 10px;
            align-items: flex-start;
        }

        .admin-box {
            background: white;
            width: 100%;
            max-width: 1000px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: #f5f5f5;
            cursor: pointer;
            border-radius: 10px 10px 0 0;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--macaron-blue);
            color: #2d3436;
        }

        .pane {
            display: none;
        }

        .pane.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #eee;
            padding: 12px;
            text-align: left;
        }

        th {
            background: #f9f9f9;
        }

        .form-row {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        textarea,
        select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 0.9rem;
            border-radius: 5px;
            cursor: pointer;
            border: none;
        }

        .btn-edit {
            background: var(--macaron-green);
        }

        .btn-del {
            background: var(--macaron-red);
            color: white;
        }

        .btn-export {
            background: #51cf66;
            color: white;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="admin-box">
        <a href="index.html" style="float: right; color: var(--macaron-red); font-weight: bold;">← 返回遊戲</a>
        <h1>後台管理系統</h1>

        <div class="tabs">
            <button class="tab-btn active" data-tab="results">成績列表</button>
            <button class="tab-btn" data-tab="questions">題庫管理</button>
        </div>

        <div id="results-pane" class="pane active">
            <button class="btn-sm btn-export" id="export-csv">匯出 Excel (CSV)</button>
            <table>
                <thead>
                    <tr>
                        <th>時間</th>
                        <th>姓名</th>
                        <th>ID</th>
                        <th>得分</th>
                    </tr>
                </thead>
                <tbody id="results-body"></tbody>
            </table>
        </div>

        <div id="questions-pane" class="pane">
            <div style="background: #f9f9f9; padding: 20px; border-radius: 15px; margin-bottom: 30px;">
                <h3 id="form-title">新增題目</h3>
                <input type="hidden" id="edit-idx" value="-1">
                <div class="form-row">
                    <label>題目文字</label>
                    <textarea id="q-text" rows="2"></textarea>
                </div>
                <div class="form-row">
                    <label>答案 (O/X)</label>
                    <select id="q-ans">
                        <option value="O">O</option>
                        <option value="X">X</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>解析說明</label>
                    <textarea id="q-exp" rows="2"></textarea>
                </div>
                <button class="main-btn" id="save-q" style="padding: 10px 20px; font-size: 1rem;">儲存題目</button>
                <button class="btn-sm" id="cancel-edit" style="display: none;">取消編輯</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>題目</th>
                        <th>答案</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="questions-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Firebase SDK (compat 版) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <!-- Firebase 設定 + 資料層 -->
    <script src="firebase-config.js"></script>
    <script src="data.js"></script>
    <!-- 管理後台主程式 -->
    <script src="admin.js"></script>
</body>

</html>
